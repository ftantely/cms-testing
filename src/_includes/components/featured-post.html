<!-- ============================================ -->

<div class="cms-sidebar">
  <!--Featured-->
  <div class="cms-featured-group">
    <span class="cms-header">Featured Posts</span>
    {%- for post in collections.featured | reverse -%}
      <a class="cms-feature" href="{{ post.url }}">
        <picture class="cms-featureImage">
          <img
                    src="{{ post.data.image }}"
                    alt="{{ post.data.imageAlt }}"
                    width="60"
                    height="60"
                    decoding="async">
        </picture>
        <div class="content-group">
          <h3 class="feature-h3">{{ post.data.title }}</h3>
          <span class="feature-date">{{ post.date | postDate }}</span>
        </div>
      </a>
    {%- endfor -%}
  </div>
  <!--Add anything else in the sidebar below-->
</div>
